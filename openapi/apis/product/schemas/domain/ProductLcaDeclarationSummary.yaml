    epdOperatorUri: "https://www.environdec.com"
    operatorEpdId: "S-P-12345"
    manufacturerEpdId: "MFR-EPD-LED-2024-001"
    productCategoryRulesDescription: "PCR 2019:14 Lighting equipment"

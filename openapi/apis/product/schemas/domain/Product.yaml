type: object
description: |
  Complete product information including identification, details, descriptions,
  classifications, and lifecycle data.
  Structured from ETIM xChange `Product` for optimal API usability.

  **ETIM xChange**: `Product`
  **Path**: `Supplier[].Product[]`
required:
  - manufacturerIdGln
  - manufacturerProductNumber
properties:
  # Composite key
  manufacturerIdGln:
    $ref: ../../../../shared/schemas/identifiers/Gln.yaml
    description: |
      Global Location Number (GLN) of the manufacturer. Primary key component.
      **ETIM xChange**: `ManufacturerIdGln`
      **Path**: `Supplier[].Product[].ProductIdentification.ManufacturerIdGln`
    examples:
      - "1234567890123"

  manufacturerProductNumber:
    type: string
    minLength: 1
    maxLength: 35
    description: |
      Manufacturer's unique product number (MPN). Primary key component.
      **ETIM xChange**: `ManufacturerProductNumber`
      **Path**: `Supplier[].Product[].ProductIdentification.ManufacturerProductNumber`
    examples:
      - "LED-12345-A"
      - "929002376910"

  # Combined ProductIdentification + ProductDetails
  details:
    description: |
      Product identification and operational details, combining fields from
      ETIM xChange `ProductIdentification` and `ProductDetails` sections (excluding descriptions).
      Absent when no product details are available.
      Note: Product descriptions are available via `/{manufacturerIdGln}/{manufacturerProductNumber}/descriptions`.
    $ref: ./ProductDetails.yaml

  # Arrays for complex structures
  descriptions:
    type: array
    description: |
      Array of multilingual product descriptions. Each item contains descriptions
      in a specific language. Absent when no descriptions are available.
      **ETIM xChange**: `ProductDescriptions`
      **Path**: `Supplier[].Product[].ProductDetails.ProductDescriptions[]`
    items:
      $ref: ./ProductDescription.yaml

  etimClassifications:
    type: array
    description: |
      Array of ETIM classifications for this product with embedded features.
      Multiple classifications can exist across different ETIM releases.
      Absent when no ETIM classifications are available.
      **ETIM xChange**: `EtimClassification`
      **Path**: `Supplier[].Product[].EtimClassification[]`
    items:
      $ref: ./EtimClassification.yaml

  lcaEnvironmental:
    $ref: ./LcaEnvironmental.yaml
    description: |
      Life Cycle Assessment and Environmental Product Declaration (EPD) data.
      Absent if the product has no LCA/EPD data.
      **ETIM xChange**: `LcaEnvironmental`
      **Path**: `Supplier[].Product[].LcaEnvironmental`

  attachments:
    type: array
    description: |
      Array of product attachments including images, documents, certificates, and other files.
      Absent when no attachments are available.
      **ETIM xChange**: `ProductAttachments`
      **Path**: `Supplier[].Product[].ProductAttachments[]`
    items:
      $ref: ./ProductAttachment.yaml

examples:
  - manufacturerIdGln: "1234567890123"
    manufacturerProductNumber: "929002376910"
    details:
      productGtins: ["8718699673826"]
      brandName: "Hue"
      productAnnouncementDate: "2024-01-15"
      productValidityDate: "2024-03-01"
      customsCommodityCode: "8539502090"
      countryOfOrigin: ["NL"]
      productStatus: "ACTIVE"
      productType: "PHYSICAL"
      customisableProduct: false
      hasSerialNumber: true
      warrantyConsumer: 24
      warrantyBusiness: 36
    descriptions:
      - descriptionLanguage: "en-GB"
        minimalProductDescription: "LED Smart Bulb E27"
        uniqueMainProductDescription: "Philips Hue White and Color Ambiance E27 LED Smart Bulb"
    etimClassifications:
      - etimClassCode: "EC002745"
        etimClassVersion: 1
        etimReleaseVersion: "9.0"
    attachments: []

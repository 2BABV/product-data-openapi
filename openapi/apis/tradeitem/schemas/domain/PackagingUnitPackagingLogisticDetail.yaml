type: object
description: |
  Logistic details for a specific packaging part within a packaging unit.
  Contains dimensions, weight, and logistics metadata for one physical packaging part.

  A packaging unit with `numberOfPackagingParts > 1` will have multiple logistic detail entries
  (e.g., a crate body + lid, each with its own dimensions and weight).

  **ETIM xChange**: `PackagingLogisticDetails`
  **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[]`
properties:
  supplierPackagingPartNumber:
    type: string
    description: |
      Supplier's part number for this specific packaging part within the packaging unit.
      Used when a packaging unit consists of multiple physical parts.
      **ETIM xChange**: `SupplierPackagingPartNumber`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].SupplierPackagingPartNumber`
    minLength: 1
    maxLength: 35
    examples:
      - "PKG-PART-001"
  manufacturerPackagingPartNumber:
    type: string
    description: |
      Manufacturer's part number for this specific packaging part within the packaging unit.
      Used when a packaging unit consists of multiple physical parts.
      **ETIM xChange**: `ManufacturerPackagingPartNumber`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].ManufacturerPackagingPartNumber`
    minLength: 1
    maxLength: 35
    examples:
      - "MFG-PKG-PART-001"
  packagingPartGtins:
    type: array
    description: |
      Array of GTINs for this specific packaging part.
      Distinct from the parent packaging unit's `packagingGtins` â€” this identifies
      the physical packaging part itself.
      **ETIM xChange**: `PackagingPartGtin[]`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingPartGtin[]`
    uniqueItems: true
    items:
      $ref: ../../../../shared/schemas/identifiers/Gtin.yaml
    examples:
      - ["04012345678901"]
  packagingTypeLength:
    type: number
    format: decimal
    description: |
      Length of the packaging part in the specified dimension unit.
      Converted from ETIM xChange patterned string to number.
      **ETIM xChange**: `PackagingTypeLength` (string with pattern)
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeLength`
    minimum: 0
    multipleOf: 0.0001
    maximum: 999999999999.9999
    examples:
      - 40.0
      - 120.0
  packagingTypeWidth:
    type: number
    format: decimal
    description: |
      Width of the packaging part in the specified dimension unit.
      Converted from ETIM xChange patterned string to number.
      **ETIM xChange**: `PackagingTypeWidth` (string with pattern)
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeWidth`
    minimum: 0
    multipleOf: 0.0001
    maximum: 999999999999.9999
    examples:
      - 30.0
      - 80.0
  packagingTypeHeight:
    type: number
    format: decimal
    description: |
      Height of the packaging part in the specified dimension unit.
      Converted from ETIM xChange patterned string to number.
      **ETIM xChange**: `PackagingTypeHeight` (string with pattern)
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeHeight`
    minimum: 0
    multipleOf: 0.0001
    maximum: 999999999999.9999
    examples:
      - 20.0
      - 100.0
  packagingTypeDiameter:
    type: number
    format: decimal
    description: |
      Diameter of the packaging part in the specified dimension unit (for cylindrical packaging).
      Converted from ETIM xChange patterned string to number.
      **ETIM xChange**: `PackagingTypeDiameter` (string with pattern)
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeDiameter`
    minimum: 0
    multipleOf: 0.0001
    maximum: 999999999999.9999
    examples:
      - 15.0
  packagingTypeDimensionUnit:
    type: string
    description: |
      Unit of measurement for packaging part dimensions (CMT=centimeter, MTR=meter, etc.).
      **ETIM xChange**: `PackagingTypeDimensionUnit`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeDimensionUnit`
    enum:
      - CMT  # Centimeter
      - DMT  # Decimeter
      - KMT  # Kilometer
      - MMT  # Millimeter
      - MTR  # Meter
      - FOT  # Foot
      - INH  # Inch
      - SMI  # Mile (statute mile)
      - YRD  # Yard
    examples:
      - CMT
      - MTR
  packagingTypeWeight:
    type: number
    format: decimal
    description: |
      Weight of the packaging part in the specified weight unit.
      Converted from ETIM xChange patterned string to number.
      **ETIM xChange**: `PackagingTypeWeight` (string with pattern)
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeWeight`
    minimum: 0
    multipleOf: 0.0001
    maximum: 999999999999.9999
    examples:
      - 500.0
      - 15000.0
  packagingTypeWeightUnit:
    type: string
    description: |
      Unit of measurement for packaging part weight (GRM=gram, KGM=kilogram, etc.).
      **ETIM xChange**: `PackagingTypeWeightUnit`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTypeWeightUnit`
    enum:
      - GRM  # Gram
      - KGM  # Kilogram
      - MGM  # Milligram
      - TNE  # Metric ton
      - LTN  # Long ton (UK)
      - LBR  # Pound
      - ONZ  # Ounce
    examples:
      - GRM
      - KGM
  serialNumberOnPackaging:
    type: boolean
    description: |
      Indicates whether a serial number is printed on this packaging part.
      **ETIM xChange**: `SerialNumberOnPackaging`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].SerialNumberOnPackaging`
    examples:
      - true
      - false
  stackingFactor:
    type: integer
    description: |
      Maximum number of identical packaging units that can be stacked on top of each other.
      **ETIM xChange**: `StackingFactor`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].StackingFactor`
    minimum: 1
    examples:
      - 2
      - 3
  packagingTippable:
    type: boolean
    description: |
      Indicates whether the packaging can be tipped (laid on its side) during transport or storage.
      **ETIM xChange**: `PackagingTippable`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[].PackagingTippable`
    examples:
      - true
      - false
examples:
  - packagingTypeLength: 40.0
    packagingTypeWidth: 30.0
    packagingTypeHeight: 20.0
    packagingTypeDimensionUnit: CMT
    packagingTypeWeight: 5000.0
    packagingTypeWeightUnit: GRM
    serialNumberOnPackaging: false
    stackingFactor: 2
    packagingTippable: true
  - supplierPackagingPartNumber: "CRATE-BASE"
    manufacturerPackagingPartNumber: "MFG-CRATE-BASE"
    packagingPartGtins: ["04012345678932"]
    packagingTypeLength: 200.0
    packagingTypeWidth: 150.0
    packagingTypeHeight: 80.0
    packagingTypeDimensionUnit: CMT
    packagingTypeWeight: 45000.0
    packagingTypeWeightUnit: GRM
    serialNumberOnPackaging: true
    stackingFactor: 1
    packagingTippable: false

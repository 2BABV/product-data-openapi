type: object
description: |
  Packaging unit information describing hierarchical packaging levels (e.g., piece, box, pallet).
  Each packaging unit contains identification, logistic details per physical part,
  and enclosed trade items.

  **ETIM xChange**: `PackagingUnit`
  **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[]`
required:
  - packagingIdentification
properties:
  packagingIdentification:
    description: |
      Packaging identification including type code, GTINs, quantities, and metadata.
      **ETIM xChange**: `PackagingIdentification`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingIdentification`
    $ref: ./PackagingUnitPackagingIdentification.yaml
  packagingLogisticDetails:
    type: array
    description: |
      Array of logistic details for each physical part of this packaging unit.
      A packaging unit with multiple physical parts (e.g., a crate body + lid)
      will have one entry per part, each with its own dimensions and weight.

      Single-part packaging typically has one entry. Absent when logistic details
      are not available.
      **ETIM xChange**: `PackagingLogisticDetails[]`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].PackagingLogisticDetails[]`
    items:
      $ref: ./PackagingUnitPackagingLogisticDetail.yaml
    examples:
      - - packagingTypeLength: 40.0
          packagingTypeWidth: 30.0
          packagingTypeHeight: 20.0
          packagingTypeDimensionUnit: CMT
          packagingTypeWeight: 5000.0
          packagingTypeWeightUnit: GRM
          stackingFactor: 2
          packagingTippable: true
  tradeItemEnclosed:
    type: array
    description: |
      Array of trade items enclosed within this packaging unit.
      Describes which other trade items are physically contained in this package.
      **ETIM xChange**: `TradeItemEnclosed[]`
      **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[].TradeItemEnclosed[]`
    items:
      $ref: ./PackagingUnitTradeItemEnclosed.yaml
    examples:
      - - enclosedSupplierItemNumber: "WIDGET-001"
          enclosedManufacturerItemNumber: "MFG-WIDGET-001"
          enclosedItemGtins: ["4012345678901"]
          enclosedItemQuantity: 5
examples:
  - packagingIdentification:
      supplierPackagingNumber: "PKG-001"
      packagingGtins: ["04012345678901"]
      packagingTypeCode: BX
      packagingUnitName: "Box"
      packagingQuantity: 10
      tradeItemPrimaryPackaging: true
      packagingBreak: false
      numberOfPackagingParts: 1
    packagingLogisticDetails:
      - packagingTypeLength: 40.0
        packagingTypeWidth: 30.0
        packagingTypeHeight: 20.0
        packagingTypeDimensionUnit: CMT
        packagingTypeWeight: 5000.0
        packagingTypeWeightUnit: GRM
        serialNumberOnPackaging: false
        stackingFactor: 2
        packagingTippable: true
    tradeItemEnclosed:
      - enclosedSupplierItemNumber: "WIDGET-001"
        enclosedManufacturerItemNumber: "MFG-WIDGET-001"
        enclosedItemGtins: ["4012345678901"]
        enclosedItemQuantity: 5
      - enclosedSupplierItemNumber: "SCREW-M8-50"
        enclosedItemQuantity: 100
  - packagingIdentification:
      supplierPackagingNumber: "PKG-CRATE"
      manufacturerPackagingNumber: "MFG-CRATE-001"
      packagingTypeCode: CR
      packagingUnitName: "Crate"
      packagingQuantity: 1
      tradeItemPrimaryPackaging: false
      packagingBreak: false
      numberOfPackagingParts: 2
    packagingLogisticDetails:
      - supplierPackagingPartNumber: "CRATE-BASE"
        manufacturerPackagingPartNumber: "MFG-CRATE-BASE"
        packagingPartGtins: ["04012345678932"]
        packagingTypeLength: 200.0
        packagingTypeWidth: 150.0
        packagingTypeHeight: 80.0
        packagingTypeDimensionUnit: CMT
        packagingTypeWeight: 45000.0
        packagingTypeWeightUnit: GRM
        serialNumberOnPackaging: true
        stackingFactor: 1
        packagingTippable: false
      - supplierPackagingPartNumber: "CRATE-LID"
        manufacturerPackagingPartNumber: "MFG-CRATE-LID"
        packagingPartGtins: ["04012345678949"]
        packagingTypeLength: 200.0
        packagingTypeWidth: 150.0
        packagingTypeHeight: 5.0
        packagingTypeDimensionUnit: CMT
        packagingTypeWeight: 8000.0
        packagingTypeWeightUnit: GRM
        serialNumberOnPackaging: false

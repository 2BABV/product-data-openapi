type: object
description: |
  Response containing a single trade item. No pagination metadata - returns exactly one trade item document.
  Used for composite-key lookups via GET /trade-items/{supplierIdGln}/{supplierItemNumber}.
required:
  - data
properties:
  data:
    $ref: ./TradeItemResponseData.yaml
examples:
  - data:
      supplierIdGln: "1234567890123"
      supplierItemNumber: "ART-12345"
      details:
        supplierAltItemNumber: "ALT-12345"
        manufacturerItemNumber: "MFG-98765"
        manufacturerIdGln: "9876543210987"
        manufacturerProductNumber: "929002376910"
        itemGtins: ["4012345678901"]
        discountGroupId: "DG-001"
        itemValidityDate: "2024-01-01"
        itemStatus: "ACTIVE"
        itemCondition: "NEW"
        stockItem: true
      descriptions:
        - descriptionLanguage: en-GB
          minimalItemDescription: "Socket outlet double"
          uniqueMainItemDescription: "Socket outlet double, flush-mounted, with child protection"
        - descriptionLanguage: nl-NL
          minimalItemDescription: "Wandcontactdoos dubbel"
          uniqueMainItemDescription: "Wandcontactdoos dubbel, inbouw, met kinderbeveiliging"
      ordering:
        orderUnit: C62
        minimumOrderQuantity: 1
        orderStepSize: 1
        standardOrderLeadTime: 5
      pricings:
        - priceUnit: C62
          priceQuantity: 1
          currencyCode: EUR
          priceOnRequest: false
          netPrice: 100.0
          grossListPrice: 130.0
          recommendedRetailPrice: 150.0
          vat: 21.0
          priceValidityDate: "2025-01-01"
          priceExpiryDate: "2025-12-31"
          allowanceSurcharges:
            - allowanceSurchargeIndicator: ALLOWANCE
              allowanceSurchargeType: AEQ
              allowanceSurchargeSequenceNumber: 1
              allowanceSurchargePercentage: 10
              allowanceSurchargeMinimumQuantity: 100
      relations: []
      logisticDetails:
        - baseItemNetLength: 25.5
          baseItemNetWidth: 15.0
          baseItemNetHeight: 10.0
          netDimensionUnit: CMT
          baseItemNetWeight: 500.0
          netWeightUnit: GRM
      attachments: []
      packagingUnits: []
  - data:
      supplierIdGln: "9876543210987"
      supplierItemNumber: "SKU-MIN-001"
      details:
        manufacturerIdGln: "9876543210987"
        manufacturerProductNumber: "PROD-MIN-001"
        itemValidityDate: "2024-01-01"
        itemStatus: "ACTIVE"
        itemCondition: "NEW"
        stockItem: true
      ordering:
        orderUnit: C62
        minimumOrderQuantity: 1
        orderStepSize: 1
      descriptions: []
      pricings: []
      relations: []
      logisticDetails: []
      attachments: []
      packagingUnits: []
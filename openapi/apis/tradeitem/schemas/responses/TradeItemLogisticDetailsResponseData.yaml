type: object
description: |
  Single trade item identification keys with logistic details.
  
  **ETIM xChange**: `ItemLogisticDetails[]`
  **Path**: `Supplier[].Product[].TradeItem[].ItemLogisticDetails[]`
required:
  - supplierIdGln
  - supplierItemNumber
  - logisticDetails
properties:
  supplierIdGln:
    $ref: ../../../../shared/schemas/identifiers/Gln.yaml
    description: Global Location Number (GLN) uniquely identifying the supplier
    examples:
      - "1234567890123"
  supplierItemNumber:
    type: string
    minLength: 1
    maxLength: 35
    description: Supplier's unique item number
    examples:
      - "SKU-12345"
  logisticDetails:
    type: array
    description: |
      Array of item logistics entries. Each entry defines base item dimensions, weight, and volume.
      Returns an empty array if no logistics data is available.
    items:
      $ref: ../domain/ItemLogistic.yaml
examples:
  - supplierIdGln: "1234567890123"
    supplierItemNumber: "SKU-12345"
    logisticDetails:
      - baseItemNetLength: 96.0
        baseItemNetWidth: 5.0
        baseItemNetHeight: 56.0
        netDimensionUnit: CMT
        baseItemNetWeight: 0.26
        netWeightUnit: KGM
        baseItemNetVolume: 68.0
        netVolumeUnit: MMQ
  - supplierIdGln: "1234567890123"
    supplierItemNumber: "SKU-12345"
    logisticDetails: []

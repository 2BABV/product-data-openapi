type: object
description: |
  Response containing packaging units for a specific trade item.
  Returns the trade item identification keys and an array of `PackagingUnit` objects,
  each with nested packaging identification, logistic details, and enclosed items.

  For flattened ETL-optimized data, use the bulk endpoints
  `/trade-items/bulk/packaging-identification` and `/trade-items/bulk/packaging-logistic-details`.

  **ETIM xChange**: `PackagingUnit[]`
  **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[]`
required:
  - data
properties:
  data:
    $ref: ./TradeItemPackagingUnitsResponseData.yaml
examples:
  - data:
      supplierIdGln: "1234567890123"
      supplierItemNumber: "SKU-12345"
      packagingUnits:
        - packagingIdentification:
            supplierPackagingNumber: "PKG-001"
            manufacturerPackagingNumber: null
            packagingGtins: ["04012345678901"]
            packagingTypeCode: BX
            packagingUnitName: "Box"
            packagingQuantity: 10
            tradeItemPrimaryPackaging: true
            packagingGs1Code128: null
            packagingBreak: false
            numberOfPackagingParts: 1
          packagingLogisticDetails:
            - supplierPackagingPartNumber: null
              manufacturerPackagingPartNumber: null
              packagingPartGtins: null
              packagingTypeLength: 40.0
              packagingTypeWidth: 30.0
              packagingTypeHeight: 20.0
              packagingTypeDiameter: null
              packagingTypeDimensionUnit: CMT
              packagingTypeWeight: 5000.0
              packagingTypeWeightUnit: GRM
              serialNumberOnPackaging: false
              stackingFactor: 2
              packagingTippable: true
          tradeItemEnclosed:
            - enclosedSupplierItemNumber: "WIDGET-001"
              enclosedManufacturerItemNumber: "MFG-WIDGET-001"
              enclosedItemGtins: ["4012345678901"]
              enclosedItemQuantity: 5
  - data:
      supplierIdGln: "1234567890123"
      supplierItemNumber: "SKU-12345"
      packagingUnits: []

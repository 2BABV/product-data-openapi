type: object
description: |
  Bulk response containing trade item pricing and allowance/surcharge information
  with cursor-based pagination.
  
  **Flattened Structure (LEFT JOIN)**: Each row in the `data` array represents a single
  pricing × allowance/surcharge combination. Pricings without surcharges appear as one row
  with all `allowanceSurcharge*` fields set to `null`. Pricings with N surcharges appear as
  N rows with pricing fields repeated on each.
  
  This follows the same denormalization pattern as `ProductEtimClassificationFeature` —
  every row is the same shape, no nesting, no artificial keys.
  
  Use the `cursor` from `meta` to retrieve the next page of results.
  
  **ETIM xChange**: Response wrapper for `Pricing[]` × `AllowanceSurcharge[]` data
  **Path**: `Supplier[].Product[].TradeItem[].Pricing[]`
required:
  - data
  - meta
properties:
  data:
    type: array
    description: Array of flattened pricing × allowance/surcharge entries (1 row per pricing-surcharge combination)
    items:
      $ref: ../domain/TradeItemPricingSummary.yaml
  meta:
    $ref: ../../../../shared/schemas/common/CursorPaginationMetadata.yaml
    description: Cursor-based pagination metadata

examples:
  - data:
      # Pricing with percentage-based allowance (row 1 of 2)
      - supplierIdGln: "8712423012485"
        supplierItemNumber: "SKU-LAMP-001"
        priceUnit: C62
        priceQuantity: 1
        currencyCode: EUR
        priceOnRequest: false
        grossListPrice: 12.99
        netPrice: 9.99
        recommendedRetailPrice: 15.99
        vat: 21.0
        priceValidityDate: "2025-01-01"
        priceExpiryDate: "2025-12-31"
        allowanceSurchargeIndicator: ALLOWANCE
        allowanceSurchargeType: AEQ
        allowanceSurchargeSequenceNumber: 1
        allowanceSurchargeValidityDate: "2025-01-01"
        allowanceSurchargePercentage: 5.5
        allowanceSurchargeMinimumQuantity: 50
      # Same pricing with fixed-amount surcharge (row 2 of 2 — pricing fields repeated)
      - supplierIdGln: "8712423012485"
        supplierItemNumber: "SKU-LAMP-001"
        priceUnit: C62
        priceQuantity: 1
        currencyCode: EUR
        priceOnRequest: false
        grossListPrice: 12.99
        netPrice: 9.99
        recommendedRetailPrice: 15.99
        vat: 21.0
        priceValidityDate: "2025-01-01"
        priceExpiryDate: "2025-12-31"
        allowanceSurchargeIndicator: SURCHARGE
        allowanceSurchargeType: DBD
        allowanceSurchargeSequenceNumber: 2
        allowanceSurchargeAmount: 25.00
      # Pricing without surcharges (all allowance/surcharge fields null)
      - supplierIdGln: "8712423012485"
        supplierItemNumber: "SKU-CABLE-002"
        priceUnit: MTR
        priceUnitFactor: 1.0
        priceQuantity: 1
        currencyCode: EUR
        netPrice: 1.99
        priceValidityDate: "2025-01-01"
        allowanceSurchargeIndicator: null
        allowanceSurchargeType: null

type: object
description: |
  Bulk response containing packaging logistic details with cursor-based pagination.

  Each item in the `data` array represents a single packaging logistic detail entry
  per packaging unit per trade item. A trade item with 2 packaging units, each having
  2 logistic detail parts, will result in 4 rows.

  This flattened structure is optimized for ETL/data warehouse ingestion and
  streaming data processing.
required:
  - data
  - meta
properties:
  data:
    type: array
    description: Array of packaging logistic detail entries. Each row is one logistic detail per packaging unit per trade item.
    items:
      $ref: ../domain/PackagingUnitPackagingLogisticDetailSummary.yaml
  meta:
    $ref: ../../../../shared/schemas/common/CursorPaginationMetadata.yaml
examples:

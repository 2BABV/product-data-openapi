get:
  operationId: getBulkTradeItemPricings
  summary: List trade item pricings with allowances and surcharges
  description: |
    Retrieve trade item pricing information with allowances/surcharges in bulk, using cursor-based pagination.
    Returns pricing details including net prices, gross list prices, recommended retail prices,
    VAT, price validity periods, currency code, and any associated allowances or surcharges.
    
    **Flattened Structure (LEFT JOIN)**: Each row represents a single pricing × allowance/surcharge
    combination with embedded composite key (`supplierIdGln` + `supplierItemNumber`).
    
    - A pricing with N allowances/surcharges produces N rows (pricing fields repeated).
    - A pricing without surcharges produces 1 row with all `allowanceSurcharge*` fields as `null`.
    
    This follows the same denormalization pattern as `/products/bulk/etim-classifications` — every
    row is the same shape, no nesting, no artificial keys.
    
    **Required field relaxation**: `allowanceSurchargeIndicator` and `allowanceSurchargeType` are
    required in the domain model but nullable here because rows for pricings without surcharges
    carry `null` for all allowance/surcharge fields.
    
    This endpoint is optimized for:
    - Predictable payload sizes per row (uniform shape)
    - Efficient cursor-based pagination
    - ETL/data warehouse ingestion (single flat fact table)
    - Price synchronization scenarios
    
    **ETIM xChange**: Bulk retrieval of `Pricing[]` × `AllowanceSurcharge[]` data  
    **Path**: `Supplier[].Product[].TradeItem[].Pricing[]`
  tags:
    - TradeItems bulk
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../../../shared/parameters/query/selection-id.yaml
    - $ref: ../../../../shared/parameters/query/mutation-date-time.yaml
    - $ref: ../../../../shared/parameters/query/supplier-id-gln-filter.yaml
  responses:
    '200':
      description: Successfully retrieved pricing × allowance/surcharge entries (1 row per combination)
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkTradeItemPricingsResponse.yaml
          examples:
            success:
              summary: Successful bulk retrieval (flattened LEFT JOIN — pricing + surcharges merged)
              value:
                data:
                  - supplierIdGln: "8712423012485"
                    supplierItemNumber: "SKU-LAMP-001"
                    priceUnit: "C62"
                    priceQuantity: 1
                    currencyCode: "EUR"
                    priceOnRequest: false
                    grossListPrice: 12.99
                    netPrice: 9.99
                    recommendedRetailPrice: 15.99
                    vat: 21.0
                    priceValidityDate: "2025-01-01"
                    priceExpiryDate: "2025-12-31"
                    allowanceSurchargeIndicator: "ALLOWANCE"
                    allowanceSurchargeType: "AEQ"
                    allowanceSurchargeSequenceNumber: 1
                    allowanceSurchargeValidityDate: "2025-01-01"
                    allowanceSurchargePercentage: 5.5
                    allowanceSurchargeMinimumQuantity: 50
                  - supplierIdGln: "8712423012485"
                    supplierItemNumber: "SKU-CABLE-002"
                    priceUnit: "MTR"
                    priceQuantity: 1
                    currencyCode: "EUR"
                    netPrice: 1.99
                    priceValidityDate: "2025-01-01"
                    allowanceSurchargeIndicator: null
                    allowanceSurchargeType: null
                meta:
                  cursor: "eyJzdXBwbGllcklkR2xuIjoiODcxMjQyMzAxMjQ4NSIsInByaWNlUXVhbnRpdHkiOjEwMH0="
                  hasNext: true
                  hasPrev: false
                  limit: 100
                  estimatedTotal: 24850
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml

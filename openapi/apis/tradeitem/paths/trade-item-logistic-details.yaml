get:
  operationId: getTradeItemLogisticDetails
  tags:
    - TradeItems single
  summary: Get trade item logistic details
  description: |
    Retrieve logistic details for a specific trade item.
    
    This endpoint returns base item logistic measurements including net dimensions
    (length, width, height, diameter), weight, and volume with their respective units.
    
    **Nested structure**: Unlike the bulk endpoint `/trade-items/bulk/logistic-details` which uses
    a flattened structure optimized for ETL, this single-item endpoint returns logistics
    in their natural nested format for easier consumption.
    
    **No pagination** - Returns all logistics entries for the specified trade item.
    
    **ETIM xChange**: `ItemLogisticDetails[]`
    **Path**: `Supplier[].Product[].TradeItem[].ItemLogisticDetails[]`
  parameters:
    - $ref: ../../../shared/parameters/path/supplier-id-gln.yaml
    - $ref: ../../../shared/parameters/path/supplier-item-number.yaml
  responses:
    '200':
      description: Successfully retrieved trade item logistic details
      content:
        application/json:
          schema:
            $ref: ../schemas/responses/TradeItemLogisticDetailsResponse.yaml
          examples:
            withLogistics:
              summary: Trade item with logistic details
              value:
                data:
                  supplierIdGln: "8712423012485"
                  supplierItemNumber: "SKU-LAMP-001"
                  logisticDetails:
                    - baseItemNetLength: 96.0
                      baseItemNetWidth: 5.0
                      baseItemNetHeight: 56.0
                      netDimensionUnit: CMT
                      baseItemNetWeight: 0.26
                      netWeightUnit: KGM
                      baseItemNetVolume: 68.0
                      netVolumeUnit: MMQ
            minimalLogistics:
              summary: Trade item with partial logistics (weight only)
              value:
                data:
                  supplierIdGln: "1234567890123"
                  supplierItemNumber: "SKU-12345"
                  logisticDetails:
                    - baseItemNetWeight: 500.0
                      netWeightUnit: GRM
            noLogistics:
              summary: Trade item without logistic details
              value:
                data:
                  supplierIdGln: "1234567890123"
                  supplierItemNumber: "SKU-12345"
                  logisticDetails: []
    '400':
      $ref: ../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../shared/responses/500-internal-server-error.yaml

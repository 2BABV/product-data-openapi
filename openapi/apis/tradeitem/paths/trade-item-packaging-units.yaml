get:
  operationId: getTradeItemPackagingUnits
  tags:
    - TradeItems single
  summary: Get trade item packaging units
  description: |
    Retrieve packaging units for a specific trade item.

    Returns the full `PackagingUnit` domain structure with nested packaging identification,
    logistic details per physical part, and enclosed items per packaging unit.

    Each packaging unit represents a hierarchical packaging level (e.g., piece, box, pallet).
    Multi-part packaging (e.g., a crate with body + lid) is represented with multiple entries
    in the `packagingLogisticDetails` array.

    **Relationship to bulk endpoints**: The bulk API separates packaging data into two optimized
    flat-row endpoints for ETL: `/trade-items/bulk/packaging-identification` (one row per packaging unit)
    and `/trade-items/bulk/packaging-logistic-details` (one row per logistic detail entry per packaging unit).
    This single-item endpoint returns the full nested domain structure for convenient consumption.

    **No pagination** - Returns all packaging units for the specified trade item.

    **ETIM xChange**: `PackagingUnit[]`
    **Path**: `Supplier[].Product[].TradeItem[].PackagingUnit[]`
  parameters:
    - $ref: ../../../shared/parameters/path/supplier-id-gln.yaml
    - $ref: ../../../shared/parameters/path/supplier-item-number.yaml
  responses:
    '200':
      description: Successfully retrieved trade item packaging units
      content:
        application/json:
          schema:
            $ref: ../schemas/responses/TradeItemPackagingUnitsResponse.yaml
          examples:
            multiplePackagingUnits:
              summary: Trade item with multiple packaging units (piece + box)
              value:
                data:
                  supplierIdGln: "8712423012485"
                  supplierItemNumber: "SKU-LAMP-001"
                  packagingUnits:
                    - packagingIdentification:
                        supplierPackagingNumber: "PKG-PIECE"
                        manufacturerPackagingNumber: null
                        packagingGtins: ["04012345678901"]
                        packagingTypeCode: C62
                        packagingUnitName: null
                        packagingQuantity: 1
                        tradeItemPrimaryPackaging: true
                        packagingGs1Code128: null
                        packagingBreak: null
                        numberOfPackagingParts: 1
                      packagingLogisticDetails:
                        - supplierPackagingPartNumber: null
                          manufacturerPackagingPartNumber: null
                          packagingPartGtins: null
                          packagingTypeLength: 25.5
                          packagingTypeWidth: 5.0
                          packagingTypeHeight: 15.0
                          packagingTypeDiameter: null
                          packagingTypeDimensionUnit: CMT
                          packagingTypeWeight: 260.0
                          packagingTypeWeightUnit: GRM
                          serialNumberOnPackaging: false
                          stackingFactor: null
                          packagingTippable: null
                      tradeItemEnclosed: null
                    - packagingIdentification:
                        supplierPackagingNumber: "PKG-BOX"
                        manufacturerPackagingNumber: null
                        packagingGtins: ["04012345678918"]
                        packagingTypeCode: BX
                        packagingUnitName: "Box"
                        packagingQuantity: 10
                        tradeItemPrimaryPackaging: false
                        packagingGs1Code128: null
                        packagingBreak: false
                        numberOfPackagingParts: 1
                      packagingLogisticDetails:
                        - supplierPackagingPartNumber: null
                          manufacturerPackagingPartNumber: null
                          packagingPartGtins: null
                          packagingTypeLength: 40.0
                          packagingTypeWidth: 30.0
                          packagingTypeHeight: 20.0
                          packagingTypeDiameter: null
                          packagingTypeDimensionUnit: CMT
                          packagingTypeWeight: 3000.0
                          packagingTypeWeightUnit: GRM
                          serialNumberOnPackaging: false
                          stackingFactor: 3
                          packagingTippable: true
                      tradeItemEnclosed:
                        - enclosedSupplierItemNumber: "SKU-LAMP-001"
                          enclosedManufacturerItemNumber: "MFG-LAMP-001"
                          enclosedItemGtins: ["04012345678901"]
                          enclosedItemQuantity: 10
            multiPartPackaging:
              summary: Trade item with multi-part packaging (crate with body + lid)
              value:
                data:
                  supplierIdGln: "1234567890123"
                  supplierItemNumber: "MACHINE-XL"
                  packagingUnits:
                    - packagingIdentification:
                        supplierPackagingNumber: "PKG-CRATE"
                        manufacturerPackagingNumber: "MFG-CRATE-001"
                        packagingGtins: null
                        packagingTypeCode: CR
                        packagingUnitName: "Crate"
                        packagingQuantity: 1
                        tradeItemPrimaryPackaging: true
                        packagingGs1Code128: null
                        packagingBreak: false
                        numberOfPackagingParts: 2
                      packagingLogisticDetails:
                        - supplierPackagingPartNumber: "CRATE-BASE"
                          manufacturerPackagingPartNumber: "MFG-CRATE-BASE"
                          packagingPartGtins: ["04012345678932"]
                          packagingTypeLength: 200.0
                          packagingTypeWidth: 150.0
                          packagingTypeHeight: 80.0
                          packagingTypeDiameter: null
                          packagingTypeDimensionUnit: CMT
                          packagingTypeWeight: 45000.0
                          packagingTypeWeightUnit: GRM
                          serialNumberOnPackaging: true
                          stackingFactor: 1
                          packagingTippable: false
                        - supplierPackagingPartNumber: "CRATE-LID"
                          manufacturerPackagingPartNumber: "MFG-CRATE-LID"
                          packagingPartGtins: ["04012345678949"]
                          packagingTypeLength: 200.0
                          packagingTypeWidth: 150.0
                          packagingTypeHeight: 5.0
                          packagingTypeDiameter: null
                          packagingTypeDimensionUnit: CMT
                          packagingTypeWeight: 8000.0
                          packagingTypeWeightUnit: GRM
                          serialNumberOnPackaging: false
                          stackingFactor: null
                          packagingTippable: null
                      tradeItemEnclosed: null
            noPackagingUnits:
              summary: Trade item without packaging units
              value:
                data:
                  supplierIdGln: "1234567890123"
                  supplierItemNumber: "SKU-12345"
                  packagingUnits: []
    '400':
      $ref: ../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../shared/responses/500-internal-server-error.yaml

get:
  operationId: getEtimModellingClassVersions
  tags:
    - Modelling single
  summary: List ETIM modelling class versions
  description: |
    Retrieve all available versions for a specific ETIM modelling class code.

    Returns full modelling class details for every available version, including nested
    features, values, ports, connection type codes, linked product class codes, and release membership.
    Results are ordered by version number descending.

    This response can be substantially larger than a single modelling class lookup. To retrieve
    one known version, use `GET /etim/modelling-classes/{classCode}?version=N`.
  parameters:
    - $ref: ../parameters/path/etim-modelling-class-code.yaml
    - $ref: ../parameters/query/etim-language.yaml
  responses:
    '200':
      description: Versions found and returned successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/responses/ModellingClassVersionsResponse.yaml
    '400':
      $ref: ../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../shared/responses/403-forbidden.yaml
    '404':
      $ref: ../../../shared/responses/404-not-found.yaml
    '500':
      $ref: ../../../shared/responses/500-internal-server-error.yaml

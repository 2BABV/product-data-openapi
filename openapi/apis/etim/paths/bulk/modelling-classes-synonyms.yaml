get:
  operationId: getBulkEtimModellingClassesSynonyms
  tags:
    - Modelling bulk
  summary: List ETIM modelling class synonyms
  description: |
    Retrieve synonyms for ETIM modelling classes filtered by language(s).

    Returns class code, version, language code, and synonym.

    The `language` parameter is required and accepts one or more comma-separated language codes
    to filter which synonyms are returned.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-languages.yaml
    - $ref: ../../parameters/query/etim-release.yaml
  responses:
    '200':
      description: Successfully retrieved modelling class synonyms
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkModellingClassesSynonymsResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml

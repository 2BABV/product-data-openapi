get:
  operationId: getBulkEtimModellingClasses
  tags:
    - Modelling bulk
  summary: List ETIM modelling classes
  description: |
    Retrieve all ETIM modelling classes in bulk with cursor-based pagination.

    Returns flat modelling class records with code, version, group, status, and release membership.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-release.yaml
  responses:
    '200':
      description: Successfully retrieved data
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkModellingClassesResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml
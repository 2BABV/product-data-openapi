get:
  operationId: getBulkEtimClassModellingClasses
  tags:
    - Classification bulk
  summary: List ETIM class-modelling-class relations
  description: |
    Retrieve all versioned links between regular ETIM classes and modelling classes in bulk.

    Consumers can use the same relation records to reconstruct linked modelling classes for
    product classes and linked product classes for modelling classes.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-release.yaml
    - $ref: ../../../../shared/parameters/query/mutation-date-time.yaml
  responses:
    '200':
      description: Successfully retrieved data
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkClassModellingClassesResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml

get:
  operationId: getBulkEtimModellingClassFeatures
  tags:
    - ETIM bulk
  summary: List ETIM modelling class-feature relations
  description: |
    Retrieve all class-feature assignment records for ETIM modelling classes (MC) in bulk.

    Extends regular class-features with portcode, variable-axis units, and dimensional drawing code.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-release.yaml
  responses:
    '200':
      description: Successfully retrieved data
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkModellingClassFeaturesResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml
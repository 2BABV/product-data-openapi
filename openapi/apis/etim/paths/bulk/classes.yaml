get:
  operationId: getBulkEtimClasses
  tags:
    - Classification bulk
  summary: List ETIM classes
  description: |
    Retrieve all ETIM classes in bulk with cursor-based pagination.

    Returns flat class records with code, version, group, status, descriptions, and release membership.

    **Pagination**: Use the `cursor` from the response `meta` to retrieve subsequent pages.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-release.yaml
    - $ref: ../../../../shared/parameters/query/mutation-date-time.yaml
  responses:
    '200':
      description: Successfully retrieved data
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkClassesResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml
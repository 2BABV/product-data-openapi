get:
  operationId: getBulkEtimClassFeatureValues
  tags:
    - Classification bulk
  summary: List ETIM class-feature-value relations
  description: |
    Retrieve all class-feature-value records for regular ETIM classes (EC) in bulk.

    Each record links a value to a specific class-feature combination.
    When a class aggregate changes, every current relation is returned with the class
    `revision` copied to `classRevision` and the class aggregate's mutation timestamp.
  parameters:
    - $ref: ../../../../shared/parameters/query/cursor.yaml
    - $ref: ../../../../shared/parameters/query/limit.yaml
    - $ref: ../../parameters/query/etim-release.yaml
    - $ref: ../../../../shared/parameters/query/mutation-date-time.yaml
  responses:
    '200':
      description: Successfully retrieved data
      content:
        application/json:
          schema:
            $ref: ../../schemas/responses/BulkClassFeatureValuesResponse.yaml
    '400':
      $ref: ../../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../../shared/responses/403-forbidden.yaml
    '500':
      $ref: ../../../../shared/responses/500-internal-server-error.yaml
get:
  operationId: getEtimClassVersions
  tags:
    - Classification single
  summary: List ETIM class versions
  description: |
    Retrieve all available versions for a specific ETIM class code.

    Returns full class details for every available version, including nested features,
    allowed values, linked modelling classes, and release membership.
    Results are ordered by version number descending.

    This response can be substantially larger than a single class lookup. To retrieve one
    known version, use `GET /etim/classes/{classCode}?version=N`.
  parameters:
    - $ref: ../parameters/path/etim-class-code.yaml
    - $ref: ../parameters/query/etim-language.yaml
  responses:
    '200':
      description: Versions found and returned successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/responses/ClassVersionsResponse.yaml
    '400':
      $ref: ../../../shared/responses/400-bad-request.yaml
    '401':
      $ref: ../../../shared/responses/401-unauthorized.yaml
    '403':
      $ref: ../../../shared/responses/403-forbidden.yaml
    '404':
      $ref: ../../../shared/responses/404-not-found.yaml
    '500':
      $ref: ../../../shared/responses/500-internal-server-error.yaml

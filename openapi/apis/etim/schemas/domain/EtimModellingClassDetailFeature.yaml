type: object
description: |
  Feature within a modelling class detail response.
  Extends class feature with modelling-specific fields (portcode, variable-axis units, dimensional drawing code).
required:
  - featureCode
  - descriptionEn
  - description
  - type
  - orderNumber
  - unitCode
  - featureGroupCode
  - portcode
  - dimensionalDrawingCode
  - values
properties:
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000100"
  descriptionEn:
    type: string
    description: Feature description in ETIM English.
    examples:
      - "Nominal diameter"
  description:
    type:
      - string
      - "null"
    description: Feature description in the requested language.
    examples:
      - "Nominale diameter"
  type:
    type: string
    description: Feature data type (Alphanumeric, Numeric, Range, Logical).
    examples:
      - "Numeric"
  orderNumber:
    type: integer
    description: Display order within the class.
    minimum: 1
    examples:
      - 1
  unitCode:
    type:
      - string
      - "null"
    description: ETIM unit code.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  unitImperialCode:
    type:
      - string
      - "null"
    description: Imperial unit code.
    pattern: "^EU[0-9]{6}$"
    examples:
      - null
  unitVariableAxisCode:
    type:
      - string
      - "null"
    description: Variable axis unit code (modelling-specific).
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000020"
  unitVariableAxisImperialCode:
    type:
      - string
      - "null"
    description: Variable axis imperial unit code (modelling-specific).
    pattern: "^EU[0-9]{6}$"
    examples:
      - null
  featureGroupCode:
    type:
      - string
      - "null"
    description: Feature group code.
    pattern: "^EFG[0-9]{5}$"
    examples:
      - "EFG00001"
  portcode:
    type:
      - integer
      - "null"
    description: |
      Port this feature belongs to. Null = class-level, non-zero = port-specific.
    examples:
      - null
      - 1
  dimensionalDrawingCode:
    type:
      - string
      - "null"
    description: Dimensional drawing reference code.
    examples:
      - "D1"
  values:
    type: array
    description: Allowed values for this feature.
    items:
      type: object
      required:
        - valueCode
        - descriptionEn
        - description
        - orderNumber
      properties:
        valueCode:
          type: string
          pattern: "^EV[0-9]{6}$"
          examples:
            - "EV000050"
        descriptionEn:
          type: string
          examples:
            - "DN 15"
        description:
          type:
            - string
            - "null"
          examples:
            - "DN 15"
        orderNumber:
          type: integer
          minimum: 1
          examples:
            - 1
examples:
  - featureCode: "EF000100"
    descriptionEn: "Nominal diameter"
    description: "Nominale diameter"
    type: "Numeric"
    orderNumber: 1
    unitCode: "EU000001"
    unitImperialCode: null
    unitVariableAxisCode: "EU000020"
    unitVariableAxisImperialCode: null
    featureGroupCode: "EFG00001"
    portcode: null
    dimensionalDrawingCode: "D1"
    values:
      - valueCode: "EV000050"
        descriptionEn: "DN 15"
        description: "DN 15"
        orderNumber: 1

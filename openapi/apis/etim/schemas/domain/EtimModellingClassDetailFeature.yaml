type: object
description: |
  Feature within a modelling class detail response.
  Extends class feature with modelling-specific fields (portcode, variable-axis units, dimensional drawing code).
required:
  - featureCode
  - descriptionEn
  - type
  - orderNumber
  - values
properties:
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000100"
  descriptionEn:
    type: string
    description: Feature description in ETIM English.
    examples:
      - "Nominal diameter"
  description:
    type: string
    description: Feature description in the requested language. Absent when no translation is available.
    examples:
      - "Nominale diameter"
  type:
    type: string
    description: Feature data type (Alphanumeric, Numeric, Range, Logical).
    examples:
      - "Numeric"
  orderNumber:
    type: integer
    description: Display order within the class.
    minimum: 1
    examples:
      - 1
  unitCode:
    type: string
    description: ETIM unit code. Absent for non-numeric features.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  unitImperialCode:
    type: string
    description: Imperial unit code. Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000045"
  unitVariableAxisCode:
    type: string
    description: Variable axis unit code (modelling-specific). Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000020"
  unitVariableAxisImperialCode:
    type: string
    description: Variable axis imperial unit code (modelling-specific). Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000030"
  featureGroupCode:
    type: string
    description: Feature group code. Absent when not assigned.
    pattern: "^EFG[0-9]{5}$"
    examples:
      - "EFG00001"
  portcode:
    type: integer
    description: |
      Port this feature belongs to. Absent = class-level feature, present (≥ 1) = port-specific.
    minimum: 1
    examples:
      - 1
  dimensionalDrawingCode:
    type: string
    description: Dimensional drawing reference code. Absent when not applicable.
    examples:
      - "D1"
  values:
    type: array
    description: Allowed values for this feature.
    items:
      type: object
      required:
        - valueCode
        - descriptionEn
        - orderNumber
      properties:
        valueCode:
          type: string
          pattern: "^EV[0-9]{6}$"
          examples:
            - "EV000050"
        descriptionEn:
          type: string
          examples:
            - "DN 15"
        description:
          type: string
          description: Value description in the requested language. Absent when no translation is available.
          examples:
            - "DN 15"
        orderNumber:
          type: integer
          minimum: 1
          examples:
            - 1
examples:
  - featureCode: "EF000100"
    descriptionEn: "Nominal diameter"
    description: "Nominale diameter"
    type: "Numeric"
    orderNumber: 1
    unitCode: "EU000001"
    unitVariableAxisCode: "EU000020"
    featureGroupCode: "EFG00001"
    dimensionalDrawingCode: "D1"
    values:
      - valueCode: "EV000050"
        descriptionEn: "DN 15"
        description: "DN 15"
        orderNumber: 1

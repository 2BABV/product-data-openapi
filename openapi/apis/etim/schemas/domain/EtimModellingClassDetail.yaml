type: object
description: |
  Detailed ETIM modelling class representation for single-entity lookup.
  Contains full nested structure including features with values and port assignments,
  linked product class codes, and ports.
  No embedded translations — use the translation endpoints instead.
required:
  - code
  - version
  - revision
  - groupCode
  - status
  - descriptionEn
  - synonyms
  - mutationDate
  - releases
  - features
  - ports
  - productClassCodes
properties:
  code:
    type: string
    description: ETIM modelling class code (MC = modelling class, CT = connection type).
    pattern: "^(MC|CT)[0-9]{6}$"
    examples:
      - "MC000001"
  version:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 2
  revision:
    type: integer
    description: Revision number.
    minimum: 0
    examples:
      - 1
  groupCode:
    type: string
    description: Code of the modelling group this class belongs to.
    pattern: "^MG[0-9]{6}$"
    examples:
      - "MG000001"
  groupDescriptionEn:
    type: string
    description: Modelling group description in ETIM English.
    examples:
      - "Valves"
  status:
    type: integer
    description: |
      Class lifecycle status code.
      2 = Under construction, 3 = Ready for publication, 5 = Published, 9 = Deleted.
    examples:
      - 5
  descriptionEn:
    type: string
    description: Class description in ETIM English.
    examples:
      - "Valve body"
  definition:
    type: string
    description: Definition or extended description of this modelling class.
    examples:
      - "The main body component of a valve assembly"
  description:
    type: string
    description: Class description in the requested language. Absent when no translation is available for the requested language.
    examples:
      - "Kleplichaam"
  synonyms:
    type: array
    description: Synonyms in the requested language.
    items:
      type: string
    examples:
      - []
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-05-01T12:00:00Z"
  dimensionalDrawingSvgUrl:
    type: string
    format: uri
    description: URL to the dimensional drawing SVG. Absent when no drawing is available.
    examples:
      - "https://cdn.etim-international.com/drawings/MC000001.svg"
  successors:
    type: array
    description: Codes of successor modelling classes that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^(MC|CT)[0-9]{6}$"
      minLength: 8
      maxLength: 8
    examples:
      - ["MC000099"]
  releases:
    type: array
    description: ETIM releases this modelling class is included in.
    items:
      type: string
    examples:
      - ["ETIM-10.0", "DYNAMIC"]
  features:
    type: array
    description: |
      Features assigned to this modelling class (class-level and port-level).
      Port-level features have a non-null portcode.
    items:
      $ref: ./EtimModellingClassDetailFeature.yaml
  ports:
    type: array
    description: Ports defined on this modelling class.
    items:
      $ref: ./EtimModellingClassPort.yaml
  productClassCodes:
    type: array
    description: |
      Regular product class codes linked to this modelling class.
      Linked versions are resolved through the selected ETIM release.
    uniqueItems: true
    items:
      type: string
      pattern: "^EC[0-9]{6}$"
examples:
  - code: "MC000001"
    version: 2
    revision: 1
    groupCode: "MG000001"
    groupDescriptionEn: "Valves"
    status: 5
    descriptionEn: "Valve body"
    description: "Kleplichaam"
    synonyms: []
    mutationDate: "2024-05-01T12:00:00Z"
    dimensionalDrawingSvgUrl: "https://cdn.etim-international.com/drawings/MC000001.svg"
    releases: ["ETIM-10.0", "DYNAMIC"]
    features:
      - featureCode: "EF000100"
        descriptionEn: "Nominal diameter"
        description: "Nominale diameter"
        type: "Numeric"
        orderNumber: 1
        unitCode: "EU000001"
        unitVariableAxisCode: "EU000020"
        featureGroupCode: "EFG00001"
        dimensionalDrawingCode: "D1"
        values: []
    ports:
      - portcode: 1
        connectionTypeCodes: ["CT001234"]
    productClassCodes: ["EC002714"]

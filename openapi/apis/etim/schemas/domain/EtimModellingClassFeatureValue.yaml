type: object
description: |
  Flat relation record linking a value to a modelling class-feature combination (MC).
  Extends the regular class-feature-value with the portcode discriminator.
required:
  - classCode
  - classVersion
  - classRevision
  - featureCode
  - valueCode
  - orderNumber
  - mutationDate
properties:
  classCode:
    type: string
    description: ETIM modelling class code (MC or CT).
    pattern: "^(MC|CT)[0-9]{6}$"
    examples:
      - "MC000001"
  classVersion:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 2
  classRevision:
    type: integer
    description: Revision of the owning modelling class or connection type aggregate.
    minimum: 0
    examples:
      - 1
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000100"
  valueCode:
    type: string
    description: ETIM value code.
    pattern: "^EV[0-9]{6}$"
    examples:
      - "EV000050"
  orderNumber:
    type: integer
    description: Display order of this value within the class-feature combination.
    minimum: 1
    examples:
      - 1
  portcode:
    type: integer
    description: |
      Port code. Absent = class-level feature value, present (≥ 1) = port-specific.
    minimum: 1
    examples:
      - 1
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-05-01T12:00:00Z"
examples:
  - classCode: "MC000001"
    classVersion: 2
    classRevision: 1
    featureCode: "EF000100"
    valueCode: "EV000050"
    orderNumber: 1
    mutationDate: "2024-05-01T12:00:00Z"

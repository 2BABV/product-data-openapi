type: object
description: |
  Flat representation of an ETIM modelling class or connection type for bulk retrieval.
  Connection types (CT) are modelling classes that have features and values but no ports.
  MC classes can reference a CT code on a port.
required:
  - code
  - version
  - groupCode
  - status
  - description
  - mutationDate
  - revision
  - releases
properties:
  code:
    type: string
    description: ETIM modelling class code (MC = modelling class, CT = connection type).
    pattern: "^(MC|CT)[0-9]{6}$"
    minLength: 8
    maxLength: 8
    examples:
      - "MC000001"
      - "CT000001"
  version:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 2
  groupCode:
    type: string
    description: Code of the modelling group this class belongs to.
    pattern: "^MG[0-9]{6}$"
    examples:
      - "MG000001"
  status:
    type: integer
    description: |
      Class lifecycle status code.
      2 = Under construction, 3 = Ready for publication, 5 = Published, 9 = Deleted.
    examples:
      - 5
  description:
    type: string
    description: Class description in ETIM English.
    examples:
      - "Valve body"
  definition:
    type: string
    description: Definition or extended description of this modelling class.
    examples:
      - "The main body component of a valve assembly"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-05-01T12:00:00Z"
  revision:
    type: integer
    description: Revision number within the current version.
    minimum: 0
    examples:
      - 1
  dimensionalDrawingSvgUrl:
    type: string
    format: uri
    description: URL to the dimensional drawing SVG for this modelling class. Absent when no drawing is available.
    examples:
      - "https://cdn.etim-international.com/drawings/MC000001.svg"
  successors:
    type: array
    description: Codes of successor modelling classes that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^(MC|CT)[0-9]{6}$"
      minLength: 8
      maxLength: 8
    examples:
      - ["MC000099"]
  releases:
    type: array
    description: ETIM releases this modelling class is included in.
    items:
      type: string
    examples:
      - ["ETIM-10.0", "DYNAMIC"]
examples:
  - code: "MC000001"
    version: 2
    groupCode: "MG000001"
    status: 5
    description: "Valve body"
    mutationDate: "2024-05-01T12:00:00Z"
    revision: 1
    dimensionalDrawingSvgUrl: "https://cdn.etim-international.com/drawings/MC000001.svg"
    releases: ["ETIM-10.0", "DYNAMIC"]

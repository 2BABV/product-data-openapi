type: object
description: |
  Detailed ETIM class representation for single-entity lookup.
  Contains full nested structure including features with their values and release membership.
  No embedded translations — use the translation endpoints instead.
required:
  - code
  - version
  - revision
  - groupCode
  - status
  - descriptionEn
  - synonyms
  - mutationDate
  - sectors
  - releases
  - features
properties:
  code:
    type: string
    description: ETIM class code.
    pattern: "^EC[0-9]{6}$"
    examples:
      - "EC002714"
  version:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 4
  revision:
    type: integer
    description: Revision number.
    minimum: 0
    examples:
      - 3
  groupCode:
    type: string
    description: Code of the ETIM group this class belongs to.
    pattern: "^EG[0-9]{6}$"
    examples:
      - "EG000017"
  groupDescriptionEn:
    type: string
    description: Group description in ETIM English.
    examples:
      - "Installation (low voltage)"
  status:
    type: integer
    description: |
      Class lifecycle status code.
      2 = Under construction, 3 = Ready for publication, 5 = Published, 9 = Deleted.
    examples:
      - 5
  descriptionEn:
    type: string
    description: Class description in ETIM English.
    examples:
      - "Socket outlet"
  definition:
    type: string
    description: Definition or extended description of this class.
    examples:
      - "A device installed in a wall to provide an electrical connection point for plugs"
  description:
    type: string
    description: Class description in the requested language. Absent when no translation is available for the requested language.
    examples:
      - "Wandcontactdoos"
  synonyms:
    type: array
    description: Synonyms in the requested language.
    items:
      type: string
    examples:
      - ["Stopcontact", "Contactdoos"]
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
  sectors:
    type: array
    description: Industry sectors (E, B, M, T, W).
    items:
      type: string
    examples:
      - ["E", "B"]
  successors:
    type: array
    description: Codes of successor classes that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^EC[0-9]{6}$"
      minLength: 8
      maxLength: 8
    examples:
      - ["EC000123"]
  releases:
    type: array
    description: ETIM releases this class is included in.
    items:
      type: string
    examples:
      - ["ETIM-10.0", "ETIM-9.0", "DYNAMIC"]
  features:
    type: array
    description: Features assigned to this class with their allowed values.
    items:
      $ref: ./EtimClassDetailFeature.yaml
examples:
  - code: "EC002714"
    version: 4
    revision: 3
    groupCode: "EG000017"
    groupDescriptionEn: "Installation (low voltage)"
    status: 5
    descriptionEn: "Socket outlet"
    description: "Wandcontactdoos"
    synonyms: ["Stopcontact"]
    mutationDate: "2024-06-15T10:30:00Z"
    sectors: ["E", "B"]
    releases: ["ETIM-10.0", "ETIM-9.0", "DYNAMIC"]
    features:
      - featureCode: "EF000007"
        descriptionEn: "Colour"
        description: "Kleur"
        type: "Alphanumeric"
        orderNumber: 1
        featureGroupCode: "EFG00001"
        values:
          - valueCode: "EV000028"
            descriptionEn: "White"
            description: "Wit"
            orderNumber: 1

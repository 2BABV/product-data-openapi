type: object
description: |
  Flat representation of an ETIM unit for bulk retrieval.
required:
  - code
  - description
  - abbreviation
  - deprecated
  - mutationDate
properties:
  code:
    type: string
    description: ETIM unit code.
    pattern: "^EU[0-9]{6}$"
    minLength: 8
    maxLength: 8
    examples:
      - "EU000001"
  description:
    type: string
    description: Unit description in ETIM English.
    examples:
      - "Millimetre"
  definition:
    type: string
    description: Definition or extended description of this unit.
    examples:
      - "One thousandth of a metre"
  abbreviation:
    type: string
    description: Unit abbreviation in ETIM English.
    examples:
      - "mm"
  deprecated:
    type: boolean
    description: Whether this unit is deprecated.
    examples:
      - false
  successors:
    type: array
    description: Codes of successor units that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^EU[0-9]{6}$"
      minLength: 8
      maxLength: 8
    examples:
      - ["EU000099"]
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-02-10T08:00:00Z"
examples:
  - code: "EU000001"
    description: "Millimetre"
    abbreviation: "mm"
    deprecated: false
    mutationDate: "2024-02-10T08:00:00Z"

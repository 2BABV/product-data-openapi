type: object
description: |
  Flat relation record linking a feature to a regular ETIM class (EC).
  Each record represents one feature assignment within a specific class version.
required:
  - classCode
  - classVersion
  - featureCode
  - orderNumber
  - type
  - local
  - mutationDate
properties:
  classCode:
    type: string
    description: ETIM class code this feature belongs to.
    pattern: "^EC[0-9]{6}$"
    examples:
      - "EC002714"
  classVersion:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 4
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000007"
  orderNumber:
    type: integer
    description: Display order of this feature within the class.
    minimum: 1
    examples:
      - 1
  unitCode:
    type: string
    description: ETIM unit code for this feature. Absent for non-numeric features.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  unitImperialCode:
    type: string
    description: Imperial unit code alternative. Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000045"
  featureGroupCode:
    type: string
    description: Feature group code for categorization within the class. Absent when not assigned.
    pattern: "^EFG[0-9]{5}$"
    examples:
      - "EFG00001"
  type:
    type: string
    description: Feature data type (Alphanumeric, Numeric, Range, Logical).
    examples:
      - "Alphanumeric"
  definition:
    type: string
    description: Definition or extended description of this feature in the context of this class.
    examples:
      - "The nominal voltage of the product"
  local:
    type: boolean
    description: Whether this is a local (non-international) feature.
    examples:
      - false
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - classCode: "EC002714"
    classVersion: 4
    featureCode: "EF000007"
    orderNumber: 1
    featureGroupCode: "EFG00001"
    type: "Alphanumeric"
    local: false
    mutationDate: "2024-06-15T10:30:00Z"

type: object
description: |
  Flat relation record linking a value to a class-feature combination for regular ETIM classes (EC).
  Each record represents one valid value for a specific feature within a class version.
required:
  - classCode
  - classVersion
  - classRevision
  - featureCode
  - valueCode
  - orderNumber
  - mutationDate
properties:
  classCode:
    type: string
    description: ETIM class code.
    pattern: "^EC[0-9]{6}$"
    examples:
      - "EC002714"
  classVersion:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 4
  classRevision:
    type: integer
    description: Revision of the owning class aggregate.
    minimum: 0
    examples:
      - 3
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000007"
  valueCode:
    type: string
    description: ETIM value code.
    pattern: "^EV[0-9]{6}$"
    examples:
      - "EV000028"
  orderNumber:
    type: integer
    description: Display order of this value within the class-feature combination.
    minimum: 1
    examples:
      - 1
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - classCode: "EC002714"
    classVersion: 4
    classRevision: 3
    featureCode: "EF000007"
    valueCode: "EV000028"
    orderNumber: 1
    mutationDate: "2024-06-15T10:30:00Z"

type: object
description: |
  Flat relation record linking a feature to an ETIM modelling class (MC).
  Extends the regular class-feature with modelling-specific fields: portcode,
  variable-axis units, and dimensional drawing code.
required:
  - classCode
  - classVersion
  - featureCode
  - orderNumber
  - type
  - local
  - mutationDate
properties:
  classCode:
    type: string
    description: ETIM modelling class code (MC or CT).
    pattern: "^(MC|CT)[0-9]{6}$"
    examples:
      - "MC000001"
  classVersion:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 2
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000100"
  orderNumber:
    type: integer
    description: Display order of this feature within the class.
    minimum: 1
    examples:
      - 1
  unitCode:
    type: string
    description: ETIM unit code. Absent for non-numeric features.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  unitImperialCode:
    type: string
    description: Imperial unit code alternative. Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000045"
  unitVariableAxisCode:
    type: string
    description: Variable axis unit code (modelling-specific). Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000020"
  unitVariableAxisImperialCode:
    type: string
    description: Variable axis imperial unit code (modelling-specific). Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000030"
  featureGroupCode:
    type: string
    description: Feature group code for categorization. Absent when not assigned.
    pattern: "^EFG[0-9]{5}$"
    examples:
      - "EFG00001"
  type:
    type: string
    description: Feature data type (Alphanumeric, Numeric, Range, Logical).
    examples:
      - "Numeric"
  definition:
    type: string
    description: Definition or extended description of this feature in the context of this class.
    examples:
      - "The nominal voltage of the product"
  local:
    type: boolean
    description: Whether this is a local (non-international) feature.
    examples:
      - false
  portcode:
    type: integer
    description: |
      Port code indicating which port this feature belongs to.
      Absent = class-level feature, present (≥ 1) = port-specific feature.
    minimum: 1
    examples:
      - 1
      - 2
  dimensionalDrawingCode:
    type: string
    description: Dimensional drawing reference code for this feature. Absent when not applicable.
    examples:
      - "D1"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-05-01T12:00:00Z"
examples:
  - classCode: "MC000001"
    classVersion: 2
    featureCode: "EF000100"
    orderNumber: 1
    unitCode: "EU000001"
    unitVariableAxisCode: "EU000020"
    featureGroupCode: "EFG00001"
    type: "Numeric"
    local: false
    dimensionalDrawingCode: "D1"
    mutationDate: "2024-05-01T12:00:00Z"

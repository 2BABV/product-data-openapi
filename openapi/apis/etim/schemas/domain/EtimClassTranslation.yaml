type: object
description: |
  Translation record for ETIM classes and modelling classes.
required:
  - code
  - version
  - languageCode
  - description
  - mutationDate
properties:
  code:
    type: string
    description: Class code (EC, MC, or CT prefix).
    examples:
      - "EC002714"
  version:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 4
  languageCode:
    $ref: ./EtimLanguageCode.yaml
  description:
    type: string
    description: Class description in the specified language.
    examples:
      - "Wandcontactdoos"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - code: "EC002714"
    version: 4
    languageCode: "nl-NL"
    description: "Wandcontactdoos"
    mutationDate: "2024-06-15T10:30:00Z"
  - code: "EC002714"
    version: 4
    languageCode: "de-DE"
    description: "Steckdose"
    mutationDate: "2024-06-15T10:30:00Z"

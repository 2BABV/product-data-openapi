type: object
description: |
  Flat representation of an ETIM value for bulk retrieval.
required:
  - code
  - description
  - deprecated
  - mutationDate
properties:
  code:
    type: string
    description: ETIM value code.
    pattern: "^EV[0-9]{6}$"
    minLength: 8
    maxLength: 8
    examples:
      - "EV000001"
  description:
    type: string
    description: Value description in ETIM English.
    examples:
      - "White"
  deprecated:
    type: boolean
    description: Whether this value is deprecated.
    examples:
      - false
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-03-01T10:00:00Z"
examples:
  - code: "EV000028"
    description: "White"
    deprecated: false
    mutationDate: "2024-03-01T10:00:00Z"

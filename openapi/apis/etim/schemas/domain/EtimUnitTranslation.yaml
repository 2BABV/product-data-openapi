type: object
description: |
  Translation record for ETIM units.
  Includes abbreviation in addition to the description.
required:
  - code
  - languageCode
  - description
  - mutationDate
properties:
  code:
    type: string
    description: Unit code.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  languageCode:
    $ref: ./EtimLanguageCode.yaml
  description:
    type: string
    description: Unit description in the specified language.
    examples:
      - "Millimeter"
  abbreviation:
    type: string
    description: Unit abbreviation in the specified language. Absent when not applicable.
    examples:
      - "mm"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - code: "EU000001"
    languageCode: "nl-NL"
    description: "Millimeter"
    abbreviation: "mm"
    mutationDate: "2024-06-15T10:30:00Z"
  - code: "EU000001"
    languageCode: "de-DE"
    description: "Millimeter"
    abbreviation: "mm"
    mutationDate: "2024-06-15T10:30:00Z"

type: object
description: |
  Port embedded in an ETIM modelling class.
  Connection type versions are resolved through the selected ETIM release.
required:
  - portcode
  - connectionTypeCodes
properties:
  portcode:
    type: integer
    description: Port identifier within the modelling class.
    minimum: 1
    examples:
      - 1
  connectionTypeCodes:
    type: array
    description: Connection type codes assigned to this port. Empty when none are assigned.
    uniqueItems: true
    items:
      type: string
      pattern: "^CT[0-9]{6}$"
    examples:
      - ["CT001234", "CT001235"]
examples:
  - portcode: 1
    connectionTypeCodes: ["CT001234", "CT001235"]
  - portcode: 2
    connectionTypeCodes: []

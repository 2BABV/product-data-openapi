type: object
description: |
  Synonym record for ETIM classes and modelling classes.
required:
  - code
  - version
  - languageCode
  - synonym
  - mutationDate
properties:
  code:
    type: string
    description: Class code (EC, MC, or CT prefix).
    examples:
      - "EC002714"
  version:
    type: integer
    description: Class version number.
    minimum: 1
    examples:
      - 4
  languageCode:
    type: string
    description: Language code (ISO 639-1 with country code).
    pattern: "^[a-z]{2}-[A-Z]{2}$"
    examples:
      - "nl-NL"
  synonym:
    type: string
    description: Class synonym in the specified language.
    examples:
      - "Stopcontact"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - code: "EC002714"
    version: 4
    languageCode: "nl-NL"
    synonym: "Stopcontact"
    mutationDate: "2024-06-15T10:30:00Z"
  - code: "EC002714"
    version: 4
    languageCode: "de-DE"
    synonym: "Wandsteckdose"
    mutationDate: "2024-06-15T10:30:00Z"

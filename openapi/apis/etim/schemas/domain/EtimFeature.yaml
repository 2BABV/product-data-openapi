type: object
description: |
  Flat representation of an ETIM feature for bulk retrieval.
required:
  - code
  - type
  - description
  - deprecated
  - local
  - mutationDate
properties:
  code:
    type: string
    description: |
      ETIM feature code. Three variants exist:
      - International: EF + 6 digits (e.g., EF000007)
      - Imperial: EF + I + 5 digits (e.g., EFI00001) — features with imperial units
      - Local: EF + 2-letter country code + 4 digits (e.g., EFNL9999) — country-specific features
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    minLength: 8
    maxLength: 8
    examples:
      - "EF000007"
      - "EFI00001"
      - "EFNL9999"
  type:
    type: string
    description: |
      Feature data type.
      Alphanumeric, Numeric, Range, or Logical.
    examples:
      - "Alphanumeric"
  description:
    type: string
    description: Feature description in ETIM English.
    examples:
      - "Colour"
  definition:
    type: string
    description: Definition or extended description of this feature.
    examples:
      - "The main body colour of the product"
  deprecated:
    type: boolean
    description: Whether this feature is deprecated.
    examples:
      - false
  local:
    type: boolean
    description: |
      Whether this is a local (country-specific, non-international) feature.
      Local features have codes like EFNL9999 with a 2-letter country code.
    examples:
      - false
  successors:
    type: array
    description: Codes of successor features that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
      minLength: 8
      maxLength: 8
    examples:
      - ["EF000099"]
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-03-20T08:00:00Z"
examples:
  - code: "EF000007"
    type: "Alphanumeric"
    description: "Colour"
    deprecated: false
    local: false
    mutationDate: "2024-03-20T08:00:00Z"
  - code: "EFNL9999"
    type: "Alphanumeric"
    description: "Local NL feature"
    deprecated: false
    local: true
    mutationDate: "2024-05-10T14:00:00Z"
  - code: "EFI00001"
    type: "Numeric"
    description: "Length (imperial)"
    deprecated: false
    local: false
    mutationDate: "2024-01-15T09:00:00Z"

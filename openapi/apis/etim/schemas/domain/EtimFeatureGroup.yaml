type: object
description: |
  Flat representation of an ETIM feature group for bulk retrieval.
required:
  - code
  - description
  - mutationDate
properties:
  code:
    type: string
    description: ETIM feature group code.
    pattern: "^EFG[0-9]{5}$"
    minLength: 8
    maxLength: 8
    examples:
      - "EFG00001"
  description:
    type: string
    description: Feature group description in ETIM English.
    examples:
      - "General"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-04-10T09:00:00Z"
examples:
  - code: "EFG00001"
    description: "General"
    mutationDate: "2024-04-10T09:00:00Z"

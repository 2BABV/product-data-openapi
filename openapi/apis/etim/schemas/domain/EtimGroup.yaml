type: object
description: |
  Flat representation of an ETIM group for bulk retrieval.
required:
  - code
  - description
  - mutationDate
properties:
  code:
    type: string
    description: ETIM group code.
    pattern: "^EG[0-9]{6}$"
    minLength: 8
    maxLength: 8
    examples:
      - "EG000001"
  description:
    type: string
    description: Group description in ETIM English.
    examples:
      - "Installation (low voltage)"
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-06-15T10:30:00Z"
examples:
  - code: "EG000017"
    description: "Installation (low voltage)"
    mutationDate: "2024-06-15T10:30:00Z"

type: object
description: |
  Feature within a class detail response, including allowed values.
required:
  - featureCode
  - descriptionEn
  - type
  - orderNumber
  - values
properties:
  featureCode:
    type: string
    description: ETIM feature code.
    pattern: "^EF([0-9]{6}|I[0-9]{5}|[A-Z]{2}[0-9]{4})$"
    examples:
      - "EF000007"
  descriptionEn:
    type: string
    description: Feature description in ETIM English.
    examples:
      - "Colour"
  description:
    type: string
    description: Feature description in the requested language. Absent when no translation is available.
    examples:
      - "Kleur"
  type:
    type: string
    description: Feature data type (Alphanumeric, Numeric, Range, Logical).
    examples:
      - "Alphanumeric"
  orderNumber:
    type: integer
    description: Display order within the class.
    minimum: 1
    examples:
      - 1
  unitCode:
    type: string
    description: ETIM unit code. Absent for non-numeric features.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000001"
  unitImperialCode:
    type: string
    description: Imperial unit code alternative. Absent when not applicable.
    pattern: "^EU[0-9]{6}$"
    examples:
      - "EU000045"
  featureGroupCode:
    type: string
    description: Feature group code. Absent when not assigned.
    pattern: "^EFG[0-9]{5}$"
    examples:
      - "EFG00001"
  values:
    type: array
    description: Allowed values for this feature within the class.
    items:
      type: object
      required:
        - valueCode
        - descriptionEn
        - orderNumber
      properties:
        valueCode:
          type: string
          pattern: "^EV[0-9]{6}$"
          examples:
            - "EV000028"
        descriptionEn:
          type: string
          examples:
            - "White"
        description:
          type: string
          description: Value description in the requested language. Absent when no translation is available.
          examples:
            - "Wit"
        orderNumber:
          type: integer
          minimum: 1
          examples:
            - 1
examples:
  - featureCode: "EF000007"
    descriptionEn: "Colour"
    description: "Kleur"
    type: "Alphanumeric"
    orderNumber: 1
    featureGroupCode: "EFG00001"
    values:
      - valueCode: "EV000028"
        descriptionEn: "White"
        description: "Wit"
        orderNumber: 1
      - valueCode: "EV000054"
        descriptionEn: "Black"
        description: "Zwart"
        orderNumber: 2

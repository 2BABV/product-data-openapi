type: object
description: |
  Flat representation of an ETIM modelling group for bulk retrieval.
required:
  - code
  - description
  - mutationDate
properties:
  code:
    type: string
    description: ETIM modelling group code.
    pattern: "^MG[0-9]{6}$"
    minLength: 8
    maxLength: 8
    examples:
      - "MG000001"
  description:
    type: string
    description: Modelling group description in ETIM English.
    examples:
      - "Valves"
  definition:
    type: string
    description: Definition or extended description of this modelling group.
    examples:
      - "Group containing modelling classes for valve components"
  successors:
    type: array
    description: Codes of successor modelling groups that replace this one (typically when deprecated).
    items:
      type: string
      pattern: "^MG[0-9]{6}$"
      minLength: 8
      maxLength: 8
    examples:
      - ["MG000099"]
  mutationDate:
    type: string
    format: date-time
    description: Date and time of last mutation.
    examples:
      - "2024-05-01T12:00:00Z"
examples:
  - code: "MG000001"
    description: "Valves"
    mutationDate: "2024-05-01T12:00:00Z"

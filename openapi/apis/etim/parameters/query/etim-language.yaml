name: language
in: query
required: false
description: |
  Single language code for the `description` field in the response.
  Uses the full locale format `xx-XX` (ISO 639-1 + ISO 3166-1 alpha-2, e.g., "nl-NL", "de-DE").
  The only exception is "EN" which is accepted as the short code for ETIM English.
  When omitted, the description defaults to ETIM English (EN).
schema:
  type: string
  examples:
    - "EN"
    - "nl-NL"
    - "de-DE"
example: "nl-NL"

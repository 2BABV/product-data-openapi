name: language
in: query
required: true
description: |
  One or more language codes to filter translations.
  Uses the full locale format `xx-XX` (ISO 639-1 + ISO 3166-1 alpha-2, e.g., "nl-NL", "de-DE").
  The only exception is "EN" which is accepted as the short code for ETIM English.
  Multiple values are comma-separated.
schema:
  type: array
  items:
    $ref: ../../schemas/domain/EtimLanguageCode.yaml
  minItems: 1
style: form
explode: false
examples:
  singleLanguage:
    summary: Single language
    value: ["nl-NL"]
  multipleLanguages:
    summary: Multiple languages
    value: ["nl-NL", "de-DE", "fr-FR"]

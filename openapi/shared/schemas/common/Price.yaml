type: number
format: decimal # hint for code generators (NSwag → C# decimal); ignored by tools that don't recognize it
minimum: 0
multipleOf: 0.0001
maximum: 9999999.9999
description: |
  Price amount with up to 4 decimal places. Maximum value of 9,999,999.9999 accommodates 
  high-value orders while maintaining realistic business constraints.
  
  In the ETIM xChange canonical model, price values are represented as strings with regex patterns.
  This API uses `type: number` with `format: decimal` for filtering, sorting, and typed code generation.
examples:
  - 12345.67
  - 99.99
  - 0.01
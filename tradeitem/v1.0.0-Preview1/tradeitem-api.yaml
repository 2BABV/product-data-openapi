            **ETIM xChange**: `AllowanceSurchargePercentage` (string with pattern)
            **Path**: `Supplier[].Product[].TradeItem[].Pricing[].AllowanceSurcharge[].AllowanceSurchargePercentage`
          minimum: 0
          multipleOf: 0.001
          maximum: 999.999

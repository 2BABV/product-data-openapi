          itemRelations: null
          itemLogistics:
            - baseItemNetLength: 25.5
              baseItemNetWidth: 15
              baseItemNetHeight: 10
              baseItemNetDiameter: null
              netDimensionUnit: CMT
              baseItemNetWeight: 500
              netWeightUnit: GRM
              baseItemNetVolume: null
              netVolumeUnit: null
          itemAttachments: null
          packagingUnits: null
          itemCountrySpecificFields: null

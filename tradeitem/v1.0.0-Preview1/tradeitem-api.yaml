            - null
        attachmentFilename:
          type:
            - string
            - 'null'
          minLength: 1
          maxLength: 100
          description: |
            Filename of the attachment.

            **ETIM xChange**: `AttachmentFilename`  
            **Path**: `Supplier[].Product[].TradeItem[].ItemAttachments[].AttachmentDetails[].AttachmentFilename`
          examples:

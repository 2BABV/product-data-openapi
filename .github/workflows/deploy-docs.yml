name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read  # build job only needs to read

concurrency:
  group: pages-deploy
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Checkout gh-pages branch for versioned content
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-content
        continue-on-error: true  # branch doesn't exist until first release

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Bundle API specs
        run: npm run bundle

      - name: Build API documentation
        run: npm run build:docs

      - name: Build domain model pages
        run: npm run build:models

      - name: Assemble site
        run: |
          mkdir -p _site

          # Start with versioned snapshots from gh-pages branch (prior releases)
          if [ -d gh-pages-content ]; then
            cp -r gh-pages-content/. _site/ 2>/dev/null || true
          fi

          # Add/update latest docs (overwrites stale latest from gh-pages)
          mkdir -p _site/product/latest _site/tradeitem/latest
          cp openapi/apis/product/generated/product.html       _site/product/latest/
          cp openapi/apis/product/generated/product-api.yaml   _site/product/latest/
          cp openapi/apis/product/CHANGELOG.md                 _site/product/latest/
          cp openapi/apis/tradeitem/generated/tradeitem.html      _site/tradeitem/latest/
          cp openapi/apis/tradeitem/generated/tradeitem-api.yaml  _site/tradeitem/latest/
          cp openapi/apis/tradeitem/CHANGELOG.md                  _site/tradeitem/latest/

          # Domain model treeview pages (generated by build:models)
          mkdir -p _site/models
          cp _test-site/*.html _site/models/

          # Landing page and Pages config
          cp site/index.html   _site/
          cp site/.nojekyll    _site/
          cp site/CNAME        _site/

          # Static assets (diagrams, images)
          mkdir -p _site/assets
          cp -r site/assets/. _site/assets/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write      # scoped to this job only
      id-token: write   # scoped to this job only
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

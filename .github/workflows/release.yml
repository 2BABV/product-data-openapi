name: Release API

on:
  push:
    tags:
      - 'product/v*'
      - 'tradeitem/v*'

concurrency:
  group: gh-pages-release
  cancel-in-progress: false  # never drop a release in progress

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read  # least-privilege for build/validate steps
    outputs:
      api_name: ${{ steps.extract.outputs.api_name }}
      version:  ${{ steps.extract.outputs.version }}
      tag:      ${{ steps.extract.outputs.tag }}
      name:     ${{ steps.display.outputs.name }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract API name and version from tag
        id: extract
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          API_NAME="${TAG%/v*}"
          VERSION="${TAG#*/v}"
          echo "api_name=$API_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=$TAG"           >> "$GITHUB_OUTPUT"

      - name: Set API display name
        id: display
        run: |
          if [ "${{ steps.extract.outputs.api_name }}" == "product" ]; then
            echo "name=Product" >> "$GITHUB_OUTPUT"
          else
            echo "name=Trade Item" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate version matches spec
        run: |
          SPEC_VERSION=$(yq eval '.info.version' "openapi/apis/${{ steps.extract.outputs.api_name }}/openapi.yaml")
          TAG_VERSION="${{ steps.extract.outputs.version }}"
          if [ "$SPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match spec version ($SPEC_VERSION). Update info.version in openapi.yaml before tagging."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Bundle API spec
        run: npm run "bundle:${{ steps.extract.outputs.api_name }}"

      - name: Build HTML docs
        run: npm run "build:${{ steps.extract.outputs.api_name }}"

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION="${{ steps.extract.outputs.version }}"
          API_NAME="${{ steps.extract.outputs.api_name }}"
          CHANGELOG="openapi/apis/$API_NAME/CHANGELOG.md"
          if ! grep -q "^## \[$VERSION\]" "$CHANGELOG"; then
            echo "::error::Version $VERSION not found in $CHANGELOG. Add a CHANGELOG entry before tagging."
            exit 1
          fi
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" "$CHANGELOG" > release-notes.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-artifacts
          path: |
            openapi/apis/${{ steps.extract.outputs.api_name }}/generated/${{ steps.extract.outputs.api_name }}-api.yaml
            openapi/apis/${{ steps.extract.outputs.api_name }}/generated/${{ steps.extract.outputs.api_name }}.html
            openapi/apis/${{ steps.extract.outputs.api_name }}/CHANGELOG.md
            release-notes.md

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create GitHub Releases and push to gh-pages branch
      actions: write   # trigger deploy-docs workflow via workflow_dispatch
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: release-artifacts
          path: artifacts

      - name: Create GitHub Release
        run: |
          API="${{ needs.build.outputs.api_name }}"
          VER="${{ needs.build.outputs.version }}"
          TAG="${{ needs.build.outputs.tag }}"
          PRERELEASE_FLAG=""
          if echo "$VER" | grep -q '-'; then PRERELEASE_FLAG="--prerelease"; fi
          gh release delete "$TAG" --repo "${{ github.repository }}" --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "${{ needs.build.outputs.name }} API v$VER" \
            --notes-file "artifacts/release-notes.md" \
            $PRERELEASE_FLAG \
            "artifacts/openapi/apis/$API/generated/$API-api.yaml" \
            "artifacts/openapi/apis/$API/generated/$API.html"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Push versioned docs to gh-pages branch
        run: |
          API="${{ needs.build.outputs.api_name }}"
          VER="v${{ needs.build.outputs.version }}"
          WORK="/tmp/gh-pages-work"
          REPO_URL="https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code "$REPO_URL" gh-pages 2>/dev/null; then
            git clone --branch gh-pages --depth 1 "$REPO_URL" "$WORK"
          else
            mkdir "$WORK"
            cd "$WORK"
            git init -b gh-pages
            git remote add origin "$REPO_URL"
            cd -
          fi

          cd "$WORK"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p "$API/$VER"
          cp "$GITHUB_WORKSPACE/artifacts/openapi/apis/$API/generated/$API-api.yaml" "$API/$VER/"
          cp "$GITHUB_WORKSPACE/artifacts/openapi/apis/$API/generated/$API.html"     "$API/$VER/"
          cp "$GITHUB_WORKSPACE/artifacts/openapi/apis/$API/CHANGELOG.md"            "$API/$VER/"

          node -e '
            const fs = require("fs");
            const p = "versions.json";
            const api = process.env.API_NAME;
            const ver = process.env.VERSION;
            const date = new Date().toISOString().slice(0, 10);
            const pre = ver.includes("-");
            let data = { product: { latest: "", versions: [] }, tradeitem: { latest: "", versions: [] } };
            try { data = JSON.parse(fs.readFileSync(p, "utf8")); } catch(e) {}
            if (!data[api]) data[api] = { latest: "", versions: [] };
            data[api].versions = [{ version: ver, date: date, prerelease: pre }, ...data[api].versions.filter(v => v.version !== ver)];
            data[api].latest = (data[api].versions.find(v => !v.prerelease) || data[api].versions[0]).version;
            fs.writeFileSync(p, JSON.stringify(data, null, 2));
            console.log("Updated versions.json for " + api + ": latest=" + data[api].latest);
          '
          git add .
          git diff --cached --quiet || git commit -m "release: $API $VER versioned docs"
          git push origin gh-pages
        env:
          API_NAME: ${{ needs.build.outputs.api_name }}
          VERSION:  ${{ needs.build.outputs.version }}

      - name: Trigger Pages deployment
        run: |
          curl --fail-with-body -sS -X POST \
            -H "Authorization: Bearer ${{ github.token }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-docs.yml/dispatches" \
            -d '{"ref":"main"}'
